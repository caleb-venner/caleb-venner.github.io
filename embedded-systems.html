<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Systems Project</title>
    <style>
        body {
            background-color: #0f1115;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        p.description {
            text-align: center;
            color: #94a3b8;
            max-width: 600px;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .image-container {
            max-width: 900px;
            width: 100%;
            background-color: #1e2128;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease-in-out;
        }
        .image-container:hover {
            transform: translateY(-4px);
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Embedded Systems Project</h1>
    <p class="description">Assessment images for the embedded systems project submission.</p>
